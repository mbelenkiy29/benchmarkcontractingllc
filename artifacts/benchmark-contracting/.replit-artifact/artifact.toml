kind = "web"
previewPath = "/"
title = "Benchmark Contracting Group"
version = "1.0.0"
id = "artifacts/benchmark-contracting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20949

[services.development]
run = "pnpm --filter @workspace/benchmark-contracting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/benchmark-contracting", "run", "build" ]
publicDir = "artifacts/benchmark-contracting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20949"
BASE_PATH = "/"
